name: DNSHE Domain Auto Renew

on:
  schedule:
    # 表达式说明：分钟 小时 天 月 星期
    # 0 0 1 * * 表示 UTC 时间每月 1 日 00:00
    # 对应北京时间 (UTC+8) 为每月 1 日 08:00
    - cron: '0 0 1 * *'
  workflow_dispatch: # 依然保留手动触发按钮，方便测试

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run renew script
        env:
          # 以下变量需在仓库 Settings -> Secrets -> Actions 中配置 
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          PUSHPLUS_TOPIC: ${{ secrets.PUSHPLUS_TOPIC }}
          # 账号 1
          DNSHE_API_KEY_1: ${{ secrets.DNSHE_API_KEY_1 }}
          DNSHE_API_SECRET_1: ${{ secrets.DNSHE_API_SECRET_1 }}
          # 账号 2
          DNSHE_API_KEY_2: ${{ secrets.DNSHE_API_KEY_2 }}
          DNSHE_API_SECRET_2: ${{ secrets.DNSHE_API_SECRET_2 }}
          # 账号 3
          DNSHE_API_KEY_3: ${{ secrets.DNSHE_API_KEY_3 }}
          DNSHE_API_SECRET_3: ${{ secrets.DNSHE_API_SECRET_3 }}
          
        run: python renew_domains.py
